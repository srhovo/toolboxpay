name: Assemble toolboxpay

on:
  push:
    paths:
      - '.github/workflows/assemble-toolboxpay.yml'

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble and verify
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t parts < <(find .build -maxdepth 1 -type f -name 'html-*.part' -print | LC_ALL=C sort)
          test "${#parts[@]}" -eq 13
          cat "${parts[@]}" > index.html
          test "$(wc -c < index.html | tr -d ' ')" = "45792"
          echo "290eb017f0bb8b98bd2b274a542a8bab5eabb5de4beb6d9e73b67c27b70cdf65  index.html" | sha256sum -c -
      - name: Publish final single file
        shell: bash
        run: |
          rm -rf .build
          rm -f .github/workflows/assemble-toolboxpay.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "发布 toolboxpay 最终版"
          git push
