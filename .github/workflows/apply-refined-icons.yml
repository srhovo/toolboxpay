name: Apply refined platform icons

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/apply-refined-icons.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply refined icons
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          page = Path('index.html')
          text = page.read_text(encoding='utf-8')

          svg_rule = '.icon-box svg{width:27px;height:27px}'
          image_rules = (
              '.icon-box img{display:block;object-fit:contain}'
              '[data-service="wechat-pay"] .icon-box img{width:42px;height:42px}'
              '[data-service="alipay"] .icon-box img{width:41px;height:41px}'
              '[data-service="qq"] .icon-box img{width:42px;height:42px}'
          )
          if image_rules not in text:
              if svg_rule not in text:
                  raise RuntimeError('Icon CSS anchor not found')
              text = text.replace(svg_rule, svg_rule + image_rules, 1)

          icons = {
              'wechat-pay': Path('.stage/wechat_pay.b64').read_text(encoding='ascii').strip(),
              'alipay': Path('.stage/alipay.b64').read_text(encoding='ascii').strip(),
              'qq': Path('.stage/qq.b64').read_text(encoding='ascii').strip(),
          }

          for service, encoded in icons.items():
              pattern = (
                  rf'(<article class="service-card [^"]*" data-service="{re.escape(service)}"[^>]*>'
                  rf'<div class="card-top"><div class="icon-box" aria-hidden="true">)'
                  rf'(.*?)'
                  rf'(</div><span class="tag default">)'
              )
              replacement = (
                  rf'\1<img src="data:image/png;base64,{encoded}" alt="" '
                  rf'loading="eager" decoding="async">\3'
              )
              text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise RuntimeError(f'Unable to replace {service} icon: {count}')

          page.write_text(text, encoding='utf-8')
          PY

      - name: Commit refined page
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Refine payment platform icons'
          git push
